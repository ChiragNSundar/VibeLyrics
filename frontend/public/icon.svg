<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e0f19" />
      <stop offset="100%" stop-color="#040408" />
    </linearGradient>
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="50%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    
    <!-- Filters for Glow and Shadows -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <!-- Background Card -->
  <rect width="512" height="512" rx="110" fill="url(#bg-grad)" stroke="rgba(255,255,255,0.06)" stroke-width="2" />

  <!-- Ambient Glow Behind Icon -->
  <circle cx="256" cy="256" r="140" fill="url(#glow-grad)" opacity="0.25" filter="url(#glow)" />

  <!-- Outer Ring (Glass Border) -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="4" stroke-dasharray="10 15" />

  <!-- Soundwaves -->
  <path d="M 120 256 A 136 136 0 0 1 392 256" fill="none" stroke="url(#primary-grad)" stroke-width="6" stroke-linecap="round" opacity="0.4" />
  <path d="M 160 256 A 96 96 0 0 1 352 256" fill="none" stroke="url(#primary-grad)" stroke-width="4" stroke-linecap="round" opacity="0.6" />

  <!-- Stylized Studio Microphone (Centerpiece) -->
  <g filter="url(#shadow)" transform="translate(0, -10)">
    <!-- Stand Base -->
    <path d="M 216 390 L 296 390 M 256 390 L 256 340" fill="none" stroke="url(#primary-grad)" stroke-width="8" stroke-linecap="round" />
    <!-- Stand U-shape -->
    <path d="M 200 240 A 56 56 0 0 0 312 240 L 312 260 A 56 56 0 0 1 200 260 Z" fill="none" stroke="url(#primary-grad)" stroke-width="8" stroke-linecap="round" />
    
    <!-- Microphone Body (Lower part) -->
    <rect x="226" y="210" width="60" height="70" rx="8" fill="url(#bg-grad)" stroke="url(#primary-grad)" stroke-width="8" />
    
    <!-- Microphone Grille (Upper part) -->
    <rect x="226" y="140" width="60" height="70" rx="30" fill="url(#primary-grad)" filter="url(#glow)" opacity="0.9" />
    
    <!-- Grille Grid Overlay -->
    <path d="M 226 175 L 286 175 M 256 140 L 256 210 M 240 146 L 240 204 M 272 146 L 272 204" fill="none" stroke="#05050a" stroke-width="3" stroke-linecap="round" opacity="0.5" />
    
    <!-- Windscreen Band -->
    <rect x="222" y="200" width="68" height="10" rx="3" fill="#05050a" opacity="0.8" />
    <rect x="222" y="200" width="68" height="10" rx="3" fill="none" stroke="url(#primary-grad)" stroke-width="2" />
  </g>
  
  <!-- Glowing Dot (Vibe status indicator) -->
  <circle cx="256" cy="245" r="5" fill="#06b6d4" filter="url(#glow)" />
</svg>
